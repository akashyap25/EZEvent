# Docker Compose — PRODUCTION
# Usage: docker compose -f docker-compose.prod.yml up -d
version: '3.8'

services:
  backend:
    build:
      context: ./backend/eazy_event_server-master
      target: production
    ports:
      - "5000:5000"
    env_file:
      - ./backend/eazy_event_server-master/.env.production
    environment:
      - NODE_ENV=production
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  frontend:
    build:
      context: ./frontend/Eazy_Event-main
      target: production
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: always
    volumes:
      - redis_prod_data:/data
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  redis_prod_data:
