# Docker Compose — DEVELOPMENT
# Usage: docker compose -f docker-compose.dev.yml up
version: '3.8'

services:
  backend:
    build:
      context: ./backend/eazy_event_server-master
      target: development
    ports:
      - "5000:5000"
    env_file:
      - ./backend/eazy_event_server-master/.env.development
    environment:
      - MONGO_URI=mongodb://mongo:27017/eazy_event_dev
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend/eazy_event_server-master:/app
      - /app/node_modules
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
    command: npm run dev

  frontend:
    build:
      context: ./frontend/Eazy_Event-main
      target: development
    ports:
      - "5174:5174"
    environment:
      - VITE_SERVER_URL=http://localhost:5000
    volumes:
      - ./frontend/Eazy_Event-main:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 5174

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_dev_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo_dev_data:
